# ============================================================
# Deployment Profile — IBM Cloud (watsonx.data)
# Managed Milvus on IBM watsonx.data
# ============================================================

id: ibm_cloud
label: IBM Cloud (watsonx.data)
description: >
  Managed Milvus running on IBM watsonx.data. Pinned to Milvus
  2.5.12. Restricted to IBM-validated index types. gRPC message
  size capped at 1 MB by underlying Kafka middleware. GPU indexes
  explicitly unsupported. Starter tier scaling disabled since
  watsonx.data v2.2.2. REST /api/v1 deprecated — use gRPC only.

connectivity:
  auth_format: ibmlhapikey  # user="ibmlhapikey_<username>", password=<api-key>
                             # OR user="ibmlhtoken_<username>", password=<iam-token>
  tls_required: true
  grpc_message_size_limit_mb: 1   # IBM Cloud Kafka-imposed cap
  deprecated_auth_forms:
    - ibmlhapikey             # bare form — deprecated, will be removed
    - ibmlhtoken              # bare form — deprecated, will be removed

indexes:
  available_index_types:
    - HNSW
    - IVF_FLAT
    - IVF_PQ
    - SCANN
    - FLAT
  default_index_type: HNSW
  default_metric_type: COSINE
  restricted_index_types:
    - DISKANN        # not IBM-validated
    - AUTOINDEX      # not IBM-validated
    - IVF_SQ8        # not IBM-validated
    - GPU_IVF_FLAT   # explicitly unsupported — no CUDA on watsonx.data
    - GPU_CAGRA      # explicitly unsupported
    - GPU_BRUTE_FORCE # explicitly unsupported

search_capabilities:
  milvus_version: "2.5.12"
  text_similarity_search_available: false  # requires Milvus >=2.6
  hybrid_search_available: true
  grouping_search_available: true
  partition_key_isolation_available: true  # Milvus >=2.4 ✓

resource_limits:
  max_insert_batch_mb: 1        # hard cap — IBM Cloud Kafka middleware
  max_topk: 16384
  max_databases: 64
  max_collections: 65536
  max_partitions_per_collection: 4095
  starter_scaling_disabled: true  # since watsonx.data v2.2.2

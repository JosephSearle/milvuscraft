# ============================================================
# Deployment Profile — Zilliz Cloud
# Fully managed Milvus-as-a-service by Zilliz
# ============================================================

id: zilliz_cloud
label: Zilliz Cloud
description: >
  Fully managed Milvus-as-a-service by Zilliz. Runs latest stable
  Milvus. AUTOINDEX is the recommended default — Zilliz selects the
  optimal index type automatically based on dataset size. GPU indexes
  available on GPU-tier clusters. gRPC message size follows Milvus
  defaults. Token auth via Zilliz API key.

connectivity:
  auth_format: token            # token=<zilliz-api-key>
  tls_required: true
  grpc_message_size_limit_mb: 64  # Milvus default; Zilliz does not restrict
  deprecated_auth_forms: []

indexes:
  available_index_types:
    - AUTOINDEX    # recommended default on Zilliz Cloud
    - HNSW
    - IVF_FLAT
    - IVF_SQ8
    - IVF_PQ
    - SCANN
    - FLAT
    - GPU_IVF_FLAT  # GPU-tier clusters only
    - GPU_CAGRA     # GPU-tier clusters only
    - GPU_BRUTE_FORCE # GPU-tier clusters only
  default_index_type: AUTOINDEX  # Zilliz-managed optimisation
  default_metric_type: COSINE
  restricted_index_types:
    - DISKANN       # not available on Zilliz Cloud managed service

search_capabilities:
  milvus_version: latest        # Zilliz tracks latest stable Milvus
  text_similarity_search_available: true   # Zilliz Cloud tracks latest Milvus
  hybrid_search_available: true
  grouping_search_available: true
  partition_key_isolation_available: true

resource_limits:
  max_insert_batch_mb: 64
  max_topk: 16384
  max_databases: 64
  max_collections: 65536
  max_partitions_per_collection: 4095
  starter_scaling_disabled: false


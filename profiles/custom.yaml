# ============================================================
# Deployment Profile — Custom
# Manual configuration for other managed deployments
# ============================================================
# Operators fill in each field manually during install.
# All fields mirror the named profile schema — Custom simply
# exposes them as manual inputs rather than auto-populating.
# ============================================================

id: custom
label: Custom
description: >
  Manual configuration for deployments not covered by a named
  profile. Fill in each constraint category based on your
  deployment's documentation.

connectivity:
  auth_format: ~                # e.g. username_password / token / none
  tls_required: ~               # true / false
  grpc_message_size_limit_mb: ~ # check your deployment docs; Milvus default is 64
  deprecated_auth_forms: []     # list any auth forms to avoid

indexes:
  available_index_types: []     # list all index types your deployment supports
  default_index_type: HNSW      # recommended starting default
  default_metric_type: COSINE   # recommended starting default
  restricted_index_types: []    # list any index types explicitly unavailable

search_capabilities:
  milvus_version: ~             # pin to your deployment's actual version
  text_similarity_search_available: ~  # true if Milvus >=2.6
  hybrid_search_available: ~
  grouping_search_available: ~
  partition_key_isolation_available: ~ # true if Milvus >=2.4

resource_limits:
  max_insert_batch_mb: ~        # check deployment docs; default 64
  max_topk: 16384               # Milvus universal default
  max_databases: 64             # Milvus universal default
  max_collections: 65536        # Milvus universal default
  max_partitions_per_collection: 4095  # Milvus universal default
  starter_scaling_disabled: ~   # true / false — managed tiers only
